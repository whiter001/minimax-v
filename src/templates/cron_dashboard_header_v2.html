<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="@refresh_seconds" />
    <title>@title</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(12, 20, 36, 0.82);
        --panel-strong: rgba(9, 17, 31, 0.96);
        --border: rgba(148, 163, 184, 0.18);
        --text: #edf4ff;
        --muted: #9fb2cc;
        --accent: #69d2ff;
        --good: #46d39d;
        --bad: #ff7a7a;
        --info: #7aa7ff;
        --shadow: 0 24px 90px rgba(1, 6, 17, 0.45);
        font-synthesis: none;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        color: var(--text);
        font-family:
          'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei UI', 'Segoe UI', sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(105, 210, 255, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at 86% 8%,
            rgba(70, 211, 157, 0.16),
            transparent 24%
          ),
          linear-gradient(160deg, var(--bg) 0%, #0a1324 42%, #050812 100%);
        line-height: 1.6;
      }
      body:before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.028) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
        mask-image: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.95),
          transparent 85%
        );
        pointer-events: none;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      code {
        color: #e6f2ff;
        background: rgba(148, 163, 184, 0.12);
        padding: 2px 6px;
        border-radius: 6px;
      }
      .page-shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 32px 22px 56px;
        position: relative;
        z-index: 1;
      }
      .hero {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        justify-content: space-between;
        align-items: flex-start;
        padding: 30px 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: linear-gradient(
          180deg,
          rgba(14, 26, 46, 0.95),
          rgba(8, 14, 27, 0.88)
        );
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }
      .hero-copy {
        max-width: 64ch;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.74rem;
        color: var(--accent);
        margin: 0 0 8px;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 4rem);
        line-height: 1.04;
      }
      .hero p {
        margin: 12px 0 0;
        color: var(--muted);
      }
      .hero-meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(160px, 1fr));
        gap: 12px;
        min-width: min(100%, 420px);
      }
      .metric-card {
        padding: 18px;
        border-radius: 22px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 12px 30px rgba(1, 6, 16, 0.22);
      }
      .metric-card.accent {
        background: linear-gradient(
          180deg,
          rgba(20, 34, 60, 0.96),
          rgba(12, 20, 37, 0.96)
        );
      }
      .metric-title {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 10px;
      }
      .metric-value {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .metric-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.5;
      }
      .section {
        margin-top: 26px;
        padding: 24px;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          rgba(10, 18, 31, 0.88),
          rgba(8, 13, 24, 0.76)
        );
        box-shadow: var(--shadow);
      }
      .section-head {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        margin-bottom: 18px;
      }
      .section-head h2 {
        margin: 0;
        font-size: 1.35rem;
      }
      .section-head .section-note {
        color: var(--muted);
        font-size: 0.88rem;
      }
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 16px;
      }
      .card,
      .execution-card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel-strong);
        padding: 18px;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
      }
      .card-head,
      .execution-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }
      .card h3 {
        margin: 0;
        font-size: 1.2rem;
      }
      .card-id {
        color: var(--muted);
        font-size: 0.8rem;
        word-break: break-all;
        text-align: right;
      }
      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .badge.success {
        background: rgba(70, 211, 157, 0.14);
        color: var(--good);
        border: 1px solid rgba(70, 211, 157, 0.28);
      }
      .badge.danger {
        background: rgba(255, 122, 122, 0.14);
        color: var(--bad);
        border: 1px solid rgba(255, 122, 122, 0.28);
      }
      .badge.info {
        background: rgba(122, 167, 255, 0.14);
        color: var(--info);
        border: 1px solid rgba(122, 167, 255, 0.28);
      }
      .badge.brand {
        background: rgba(105, 210, 255, 0.14);
        color: var(--accent);
        border: 1px solid rgba(105, 210, 255, 0.28);
      }
      .badge.muted {
        background: rgba(148, 163, 184, 0.12);
        color: var(--muted);
        border: 1px solid rgba(148, 163, 184, 0.24);
      }
      .job-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 0 16px;
        margin-top: 16px;
      }
      .field {
        padding: 12px 0;
        border-top: 1px solid rgba(148, 163, 184, 0.12);
      }
      .field:first-child,
      .field:nth-child(2) {
        border-top: 0;
        padding-top: 0;
      }
      .field span {
        display: block;
        color: var(--muted);
        font-size: 0.76rem;
        margin-bottom: 6px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .field strong {
        display: block;
        line-height: 1.6;
        word-break: break-word;
      }
      .latest {
        margin-top: 16px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(8, 14, 25, 0.84);
      }
      .latest.success {
        border-color: rgba(70, 211, 157, 0.24);
        background: rgba(70, 211, 157, 0.08);
      }
      .latest.danger {
        border-color: rgba(255, 122, 122, 0.24);
        background: rgba(255, 122, 122, 0.08);
      }
      .latest.muted {
        background: rgba(148, 163, 184, 0.08);
      }
      .latest-title {
        font-weight: 700;
        margin-bottom: 4px;
      }
      .latest-meta {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.5;
        margin-bottom: 10px;
      }
      .output {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
        background: rgba(1, 6, 17, 0.54);
        border: 1px solid rgba(148, 163, 184, 0.14);
        white-space: pre-wrap;
        word-break: break-word;
        color: #d8e6ff;
        font-family:
          'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono',
          monospace;
        font-size: 0.82rem;
        line-height: 1.55;
      }
      .output.muted {
        color: var(--muted);
      }
      .execution-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .execution-card {
        padding: 18px;
      }
      .execution-meta,
      .execution-stats {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.55;
      }
      .execution-stats {
        margin: 12px 0 10px;
      }
      .empty-state {
        padding: 28px;
        border-radius: 22px;
        border: 1px dashed rgba(148, 163, 184, 0.24);
        background: rgba(8, 14, 25, 0.7);
        color: var(--muted);
        line-height: 1.7;
      }
      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.6;
      }
      .footer code {
        color: #e6f2ff;
        background: rgba(148, 163, 184, 0.12);
        padding: 2px 6px;
        border-radius: 6px;
      }
      .section-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 18px;
        border-radius: 14px;
        border: 1px solid var(--border);
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 0.78rem;
        border-radius: 10px;
      }
      .btn-primary {
        background: linear-gradient(135deg, rgba(105, 210, 255, 0.2), rgba(70, 180, 255, 0.15));
        color: var(--accent);
        border-color: rgba(105, 210, 255, 0.4);
      }
      .btn-primary:hover {
        background: linear-gradient(135deg, rgba(105, 210, 255, 0.35), rgba(70, 180, 255, 0.25));
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text);
        border-color: rgba(148, 163, 184, 0.24);
      }
      .btn-secondary:hover {
        background: rgba(148, 163, 184, 0.2);
      }
      .btn-success {
        background: rgba(70, 211, 157, 0.15);
        color: var(--good);
        border-color: rgba(70, 211, 157, 0.3);
      }
      .btn-success:hover {
        background: rgba(70, 211, 157, 0.25);
      }
      .btn-danger {
        background: rgba(255, 122, 122, 0.15);
        color: var(--bad);
        border-color: rgba(255, 122, 122, 0.3);
      }
      .btn-danger:hover {
        background: rgba(255, 122, 122, 0.25);
      }
      .job-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.12);
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal.show {
        display: flex;
      }
      .modal-content {
        background: linear-gradient(180deg, rgba(14, 26, 46, 0.98), rgba(8, 14, 27, 0.96));
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 28px;
        max-width: 520px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 32px 120px rgba(0, 0, 0, 0.5);
      }
      .modal-content.modal-sm {
        max-width: 400px;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .modal-header h2 {
        margin: 0;
        font-size: 1.3rem;
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 1.8rem;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 10px;
        transition: all 0.2s;
      }
      .modal-close:hover {
        background: rgba(148, 163, 184, 0.15);
        color: var(--text);
      }
      .modal-body {
        margin-bottom: 24px;
      }
      .modal-body p {
        margin: 8px 0;
      }
      .form-group {
        margin-bottom: 18px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.88rem;
        color: var(--muted);
        font-weight: 500;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        background: rgba(8, 14, 25, 0.84);
        color: var(--text);
        font-size: 0.92rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }
      .form-group small {
        display: block;
        margin-top: 6px;
        font-size: 0.78rem;
        color: var(--muted);
      }
      .form-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .toast {
        display: none;
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 14px 24px;
        border-radius: 16px;
        font-size: 0.92rem;
        z-index: 2000;
        animation: slideIn 0.3s ease;
      }
      .toast.show {
        display: block;
      }
      .toast.success {
        background: rgba(70, 211, 157, 0.92);
        color: #021a0a;
      }
      .toast.error {
        background: rgba(255, 122, 122, 0.92);
        color: #1a0808;
      }
      @keyframes slideIn {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @media (max-width: 720px) {
        .page-shell {
          padding: 18px 12px 36px;
        }
        .hero,
        .section {
          padding: 20px;
          border-radius: 22px;
        }
        .hero-meta {
          grid-template-columns: 1fr;
          min-width: 100%;
        }
        .cards-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell"></main>
  </body>
</html>
