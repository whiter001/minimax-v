</main>
<script>
let deleteTargetId = '';
let editTargetId = '';

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show ' + (type || 'success');
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function openCreateModal() {
  document.getElementById('create-modal').classList.add('show');
  document.getElementById('create-form').reset();
  toggleJobTypeField('create');
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('show');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('show');
  editTargetId = '';
}

function toggleJobTypeField(prefix) {
  const type = document.getElementById(prefix + '-job-type').value;
  document.getElementById(prefix + '-delay-field').style.display = type === 'once' ? 'block' : 'none';
  document.getElementById(prefix + '-schedule-field').style.display = type === 'once' ? 'none' : 'block';
}

function computeDelaySeconds(nextRun) {
  const now = Math.floor(Date.now() / 1000);
  const remaining = nextRun - now;
  return remaining > 0 ? remaining : 1;
}

function submitJobForm(url, method, form, onSuccessMessage, onClose) {
  return (async () => {
    const fd = new FormData(form);
    const params = new URLSearchParams(fd);
    const request_url = url + '?' + params.toString();
    const res = await fetch(request_url, { method });
    const data = await res.json();
    if (data.success) {
      showToast(onSuccessMessage);
      onClose();
      setTimeout(() => location.reload(), 500);
    } else {
      showToast('错误: ' + (data.error || 'unknown'), 'error');
    }
  })();
}

document.getElementById('create-form').addEventListener('submit', (e) => {
  e.preventDefault();
  submitJobForm('/api/jobs', 'POST', e.target, '任务创建成功', closeCreateModal).catch(() => {
    showToast('创建失败', 'error');
  });
});

document.getElementById('edit-form').addEventListener('submit', (e) => {
  e.preventDefault();
  if (!editTargetId) return;
  submitJobForm('/api/jobs/update', 'POST', e.target, '任务更新成功', closeEditModal).catch(() => {
    showToast('更新失败', 'error');
  });
});

function openEditModal(btn) {
  const runOnce = btn.dataset.runOnce === 'true';
  const nextRun = parseInt(btn.dataset.nextRun || '0', 10);
  editTargetId = btn.dataset.id;
  document.getElementById('edit-job-id').value = editTargetId;
  document.getElementById('edit-job-name').value = btn.dataset.name || '';
  document.getElementById('edit-command').value = btn.dataset.command || '';
  document.getElementById('edit-job-type').value = runOnce ? 'once' : 'cron';
  document.getElementById('edit-schedule').value = btn.dataset.schedule || '';
  document.getElementById('edit-delay-seconds').value = runOnce ? String(computeDelaySeconds(nextRun)) : '60';
  toggleJobTypeField('edit');
  document.getElementById('edit-modal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('show');
  deleteTargetId = '';
}

document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
  if (!deleteTargetId) return;
  try {
    const res = await fetch('/api/jobs/' + deleteTargetId, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast('任务已删除');
      closeDeleteModal();
      setTimeout(() => location.reload(), 500);
    } else {
      showToast('删除失败', 'error');
    }
  } catch (e) {
    showToast('删除失败', 'error');
  }
});

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'run') runJob(id);
  else if (action === 'edit') openEditModal(btn);
  else if (action === 'toggle') toggleJob(id);
  else if (action === 'delete') {
    deleteTargetId = id;
    const card = document.getElementById('job-' + id);
    document.getElementById('delete-job-name').textContent = card.querySelector('h3').textContent;
    document.getElementById('delete-modal').classList.add('show');
  }
});

async function toggleJob(id) {
  try {
    const res = await fetch('/api/jobs/' + id + '/toggle', { method: 'PUT' });
    const data = await res.json();
    if (data.success) showToast('状态已切换');
    else showToast('切换失败', 'error');
    setTimeout(() => location.reload(), 500);
  } catch (e) { showToast('切换失败', 'error'); }
}

async function runJob(id) {
  try {
    const res = await fetch('/api/jobs/' + id + '/run', { method: 'POST' });
    const data = await res.json();
    if (data.success) showToast('任务已执行');
    else showToast('执行失败', 'error');
    setTimeout(() => location.reload(), 500);
  } catch (e) { showToast('执行失败', 'error'); }
}
</script>
</body>
</html>
